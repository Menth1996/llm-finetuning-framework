model:
  model_name: "bert-base-uncased"
  tokenizer_name: "bert-base-uncased"
  num_labels: 2 # For sequence classification tasks

data:
  dataset_name: "imdb"
  split: "train"
  max_length: 512

training:
  output_dir: "./results"
  logging_dir: "./logs"
  report_to: "mlflow"
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  warmup_steps: 500
  weight_decay: 0.01
